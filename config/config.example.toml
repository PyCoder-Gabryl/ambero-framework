[system]
# Bezwzględna ścieżka do katalogu głównego Ambero (ustawiana przez instalator)
ambero_home = ""
# Typ systemu operacyjnego (macos-arm64, debian-x86_64 itp.)
os_type = ""

[ui]
# Tryb wyświetlania ikon: "emoji" (domyślny) lub "nerd" (wymaga Nerd Fonts)
ui_mode = "emoji"

[maintenance]
# Data ostatniego sprawdzenia aktualizacji systemowych (YYYY-MM-DD)
last_update_check = ""
# Co ile dni sprawdzać aktualizacje (domyślnie 7)
update_interval_days = 7

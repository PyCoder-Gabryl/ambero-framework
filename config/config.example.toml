# ----------------------------------------------------------------------------
# DESCRIPTION:      Główny szablon konfiguracji frameworku Ambero.
#                   Definiuje parametry systemowe, preferencje wizualne,
#                   ustawienia powłok oraz zarządza stanem wtyczek
#                   w podziale na oficjalne, użytkownika i eksperymentalne.
# ----------------------------------------------------------------------------
# PATH:            config/config.example.toml
# VERSION:         0.1.2
# CREATED:         2026-07-16
# ============================================================================

[system]
# Bezwzględna ścieżka do instalacji Ambero (ustawiana przez instalator)
ambero_home = ""
# Wykryty system operacyjny (np. macos, debian)
os_type = ""
# Wersja frameworku
version = "0.1.0-dev"

[shell]
# Główna powłoka użytkownika (zsh / bash)
default_shell = "zsh"
# Czy automatycznie odświeżać powłokę po zmianach?
auto_reload = true

[maintenance]
# Data ostatniej weryfikacji aktualizacji (YYYY-MM-DD)
last_update_check = ""
# Interwał sprawdzania aktualizacji w dniach
update_interval_days = 7

[plugins.official]
# Status oficjalnych wtyczek frameworku
ambero = { enabled = true, version = "0.1.0" }
system = { enabled = true, version = "0.1.0" }

[plugins.user]
# Miejsce na Twoje prywatne wtyczki (am_plugins/user/)
# Przykład: my_tool = { enabled = true }

[plugins.experimental]
# Wtyczki w fazie testów (am_plugins/experimental/)
# Przykład: new_feature = { enabled = false }

[ui]
# Tryb ikon: "emoji" (standard) lub "nerd" (wymaga Nerd Fonts)
ui_mode = "emoji"
# Język komunikatów: "pl" lub "en"
language = "pl"
# Poziom komunikatów: "quiet", "minimal", "normal", "edu" [NOWE]
verbosity = "normal"
